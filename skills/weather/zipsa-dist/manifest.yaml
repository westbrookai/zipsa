apiVersion: zipsa.dev/v1alpha1
kind: SkillManifest
metadata:
  name: weather
  version: 0.6.0
  author: westbrookai
  description: Reports current weather conditions for any location worldwide. Atomic; emits weather.json artifact for downstream skills.
  tags: [weather, utility]

spec:
  purpose: |
    Answer current weather queries for any location.
    Refuse anything not directly weather-related.

  instructions: ./instruction.md

  model:
    name: claude-haiku-4-5-20251001

  tools:
    builtin:
      - WebFetch
      - Write

  network:
    allow:
      - wttr.in

  limits:
    max_turns: 6
    max_cost_usd: 0.10
    timeout_seconds: 60
