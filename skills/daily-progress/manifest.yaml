apiVersion: zipsa.dev/v1alpha1
kind: Skill
metadata:
  name: daily-progress
  version: 0.5.0
  author: westbrookai
  description: |
    Summarize Claude Code sessions for a single day across all projects
    and log them to a Notion daily progress database.
  tags: [productivity, notion, claude-code]

spec:
  purpose: |
    Find Claude Code sessions that had activity on a target date
    (default: yesterday), summarize the work per project, and write a
    structured entry per project to the configured Notion database.

  instructions: ./SKILL.md

  model:
    name: claude-opus-4-7

  # Per-user host-side values the launcher needs before container start.
  # `project_roots` is asked once on first run (or via `zipsa configure`),
  # saved to ~/.zipsa/daily-progress@<version>/requires.yaml, and used
  # to mount the user's git project parent directories below.
  requires:
    project_roots:
      type: list[directory]
      prompt: |
        Which directories contain your git projects?
        These get mounted read-only so agenthud --with-git can resolve
        the .git directory referenced by each Claude session's `cwd`.
        One path per line, ~ is expanded; empty line to finish.

  mounts:
    # Bind-mount Claude's session logs at their default location so agenthud
    # picks them up without any extra configuration.
    - host: ~/.claude/projects
      container: /home/agent/.claude/projects
      mode: ro

    # Mount each project root at its own host path inside the container.
    # Required by agenthud --with-git: each session's JSONL records a
    # host-side `cwd` (e.g. /Users/x/Code/zipsa), and agenthud runs
    # `git --git-dir=<cwd>/.git log` on those paths verbatim.
    - source: requires.project_roots
      preserve_host_path: true
      mode: ro

  # MCP servers used by this skill
  mcp:
    # Remote http: write to Notion
    - name: notion
      type: http
      url: https://mcp.notion.com/mcp
      auth:
        type: oauth2
      allowed_tools:
        - notion-search
        - notion-create-database
        - notion-create-pages
        - notion-update-page
        - notion-fetch

  tools:
    builtin: []

  # Skill-author defaults. Per-user values (workspace, db name, timezone)
  # are NOT here — workspace/db are asked once on first run and remembered;
  # timezone comes from the runtime's execution_context.
  config:
    default_target_date: yesterday   # yesterday | today
    agenthud_version: "0.9.2"        # pinned for reproducibility

  # Cross-run state schema (managed by launcher via state_updates)
  state_schema:
    db_id: string                    # Notion database ID once resolved
    data_source_id: string           # Notion data source ID (required for create-pages)
    last_run_date: string            # ISO date of the most recent run

  # Phased execution. Each phase runs in its own sandboxed turn budget.
  # SKILL.md must contain a section per phase id.
  phases:
    - id: precheck
      goal: |
        Verify Notion is reachable, resolve target date from the user
        query, ensure per-user Notion workspace/db name are known, and
        locate or create the Notion database.
      allowed_tools:
        - mcp__notion__notion-search
        - mcp__notion__notion-fetch
        - mcp__notion__notion-create-database
        - mcp__notion__notion-create-pages
      limits:
        max_turns: 8
        max_cost_usd: 0.15
        timeout_seconds: 90

    - id: report
      goal: |
        Run agenthud to fetch a structured per-project activity report for
        the target date, then group/summarize for Notion.
      allowed_tools:
        - Bash(npx:*)
      limits:
        max_turns: 6
        max_cost_usd: 0.30
        timeout_seconds: 180

    - id: persist
      goal: |
        Write or update one Notion entry per project for the target date.
      allowed_tools:
        - mcp__notion__notion-search
        - mcp__notion__notion-fetch
        - mcp__notion__notion-create-pages
        - mcp__notion__notion-update-page
      limits:
        max_turns: 12
        max_cost_usd: 0.40
        timeout_seconds: 150

  # Aggregate run limits (sum across phases should not exceed)
  limits:
    max_turns: 29
    max_cost_usd: 0.95
    timeout_seconds: 480
