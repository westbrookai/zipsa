apiVersion: zipsa.dev/v1alpha1
kind: Skill
metadata:
  name: daily-progress
  version: 0.2.0
  author: westbrookai
  description: |
    Summarize Claude Code sessions for a single day across all projects
    and log them to a Notion daily progress database.
  tags: [productivity, notion, claude-code]

spec:
  purpose: |
    Find Claude Code sessions that had activity on a target date
    (default: yesterday), summarize the work per project, and write a
    structured entry per project to the configured Notion database.

  instructions: ./SKILL.md

  model:
    name: claude-opus-4-7

  # MCP servers used by this skill
  mcp:
    # Local stdio: read Claude Code session logs (read-only)
    - name: sessions
      type: stdio
      command: npx
      args:
        - "@modelcontextprotocol/server-filesystem@2025.11.25"
      mount:
        host: "~/.claude/projects"
        mode: ro
      allowed_tools:
        - search_files
        - get_file_info
        - list_directory
        - read_file

    # Remote http: write to Notion
    - name: notion
      type: http
      url: https://mcp.notion.com/mcp
      auth:
        type: oauth2
      allowed_tools:
        - notion-search
        - notion-create-database
        - notion-create-pages
        - notion-update-page
        - notion-fetch

  tools:
    builtin:
      - Bash

  # Skill-specific configuration. Skill author defines, user may override.
  config:
    workspace_name: "Westbrook AI HQ"
    db_name: "zipsa-daily-log"
    timezone: "Australia/Sydney"
    default_target_date: yesterday   # yesterday | today

  # Cross-run state schema (managed by launcher via state_updates)
  state_schema:
    db_id: string                    # Notion database ID once resolved
    last_run_date: string            # ISO date of the most recent run

  # Phased execution. Each phase runs in its own sandboxed turn budget.
  # SKILL.md must contain a section per phase id.
  phases:
    - id: precheck
      goal: |
        Verify MCP connections, resolve target date from the user query,
        and locate or create the Notion database.
      allowed_tools:
        - mcp__notion__notion-search
        - mcp__notion__notion-fetch
        - mcp__notion__notion-create-database
        - mcp__notion__notion-create-pages
      limits:
        max_turns: 5
        max_cost_usd: 0.05
        timeout_seconds: 60

    - id: discover
      goal: |
        Find Claude Code session files modified on the target date.
      allowed_tools:
        - Bash
      limits:
        max_turns: 4
        max_cost_usd: 0.04
        timeout_seconds: 30

    - id: analyze
      goal: |
        Read each discovered session and extract per-project information:
        session goals, tools used, and key outcomes.
      allowed_tools:
        - mcp__sessions__read_file
      limits:
        max_turns: 14
        max_cost_usd: 0.25
        timeout_seconds: 180

    - id: persist
      goal: |
        Write or update one Notion entry per project for the target date.
      allowed_tools:
        - mcp__notion__notion-search
        - mcp__notion__notion-fetch
        - mcp__notion__notion-create-pages
        - mcp__notion__notion-update-page
      limits:
        max_turns: 8
        max_cost_usd: 0.15
        timeout_seconds: 120

  # Aggregate run limits (sum across phases should not exceed)
  limits:
    max_turns: 35
    max_cost_usd: 0.60
    timeout_seconds: 420
