apiVersion: zipsa.dev/v1alpha1
kind: Skill
metadata:
  name: daily-progress
  version: 0.1.0
  author: westbrookai
  description: |
    Summarize today's Claude Code sessions across all projects
    and log them to a Notion daily progress database.
  tags: [productivity, notion, claude-code]

spec:
  purpose: |
    For the current date, find all Claude Code sessions that had activity today,
    summarize what was worked on per project, and write a structured entry to
    the Westbrook AI HQ Notion workspace.

  instructions: ./SKILL.md

  model:
    name: claude-opus-4-7

  # MCP servers used by this skill
  mcp:
    # Local stdio: read Claude Code session logs
    # Container path auto-generated as /home/agent/workspace/sessions
    - name: sessions
      type: stdio
      command: npx
      args:
        - "@modelcontextprotocol/server-filesystem@2025.11.25"
      mount:
        host: "~/.claude/projects"
        mode: ro
      allowed_tools:
        - read_file
        - list_directory
        - directory_tree

    # Remote http: write to Notion
    - name: notion
      type: http
      url: https://mcp.notion.com/mcp
      allowed_tools:
        - notion-search
        - notion-create-database
        - notion-create-pages
        - notion-update-page
        - notion-fetch

    - name: githubcopilot
      type: http
      url: https://api.githubcopilot.com/mcp
      headersHelper: "echo \"{\\\"Authorization\\\": \\\"Bearer $GITHUB_PERSONAL_ACCESS_TOKEN\\\"}\""
      env:
        - GITHUB_PERSONAL_ACCESS_TOKEN

  tools:
    builtin: []

  # Skill-specific configuration
  config:
    workspace_name: "Westbrook AI HQ"
    db_name: "zipsa-daily-log"
    db_search_strategy: notion_search
    timezone: "Australia/Sydney"

  limits:
    max_turns: 30
    max_cost_usd: 0.50
    timeout_seconds: 60
