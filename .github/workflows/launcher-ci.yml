name: Launcher CI

on:
  push:
    branches: [ main ]
    paths:
      - 'launcher/**'
      - '.github/workflows/launcher-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'launcher/**'
      - '.github/workflows/launcher-ci.yml'

jobs:
  test:
    name: Test Python Package
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12', '3.13']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        enable-cache: true

    - name: Install dependencies
      run: |
        cd launcher
        uv pip install -e ".[dev]"

    - name: Run tests with coverage
      run: |
        cd launcher
        uv run pytest --cov=zipsa --cov-report=term-missing --cov-report=xml

    - name: Check coverage threshold
      run: |
        cd launcher
        uv run pytest --cov=zipsa --cov-fail-under=70

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      if: matrix.python-version == '3.12'
      with:
        file: ./launcher/coverage.xml
        flags: launcher
        fail_ci_if_error: false

  lint:
    name: Lint and Type Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v4

    - name: Install dependencies
      run: |
        cd launcher
        uv pip install -e ".[dev]"

    - name: Check code formatting (if configured)
      run: |
        cd launcher
        # Add linting commands if configured
        # uv run black --check zipsa/ tests/
        # uv run ruff check zipsa/ tests/
        echo "Linting step (configure as needed)"

    - name: Type checking (if configured)
      run: |
        cd launcher
        # Add type checking if configured
        # uv run mypy zipsa/
        echo "Type checking step (configure as needed)"
