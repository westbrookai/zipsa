name: Publish Runtime to GHCR

on:
  push:
    tags:
      - 'runtime-v*.*.*'  # Triggers on runtime version tags like runtime-v0.3.0

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/zipsa-runtime

jobs:
  publish:
    name: Build and Push Runtime to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Extract version from tag
      id: version
      run: |
        # Extract version without 'runtime-v' prefix (runtime-v0.3.0 -> 0.3.0)
        VERSION=${GITHUB_REF#refs/tags/runtime-v}
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        echo "Tag version: ${VERSION}"

    - name: Validate Dockerfile ARG IMAGE_VERSION matches tag
      run: |
        LABEL_VERSION=$(grep 'ARG IMAGE_VERSION=' runtime/Dockerfile | sed 's/.*ARG IMAGE_VERSION="\(.*\)"/\1/')
        TAG_VERSION=${{ steps.version.outputs.version }}
        echo "Dockerfile ARG IMAGE_VERSION: ${LABEL_VERSION}"
        echo "Git tag version:              ${TAG_VERSION}"
        if [ "${LABEL_VERSION}" != "${TAG_VERSION}" ]; then
          echo "ERROR: Dockerfile ARG IMAGE_VERSION (${LABEL_VERSION}) does not match git tag version (${TAG_VERSION})"
          echo "Update ARG IMAGE_VERSION in runtime/Dockerfile before tagging."
          exit 1
        fi
        echo "OK: versions match (${TAG_VERSION})"

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=semver,pattern={{version}},value=${{ steps.version.outputs.version }}
          type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.version }}
          type=raw,value=latest

    - name: Build and push multi-arch image
      uses: docker/build-push-action@v6
      with:
        context: ./runtime
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        build-args: IMAGE_VERSION=${{ steps.version.outputs.version }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
