apiVersion: zipsa.dev/v1alpha1
kind: SkillManifest
metadata:
  name: skill-builder
  version: 0.1.0
  author: westbrookai
  description: 새 skill 을 만들고, 돌려보고, 함께 다듬는 built-in skill.
  tags: [meta, builder, built-in]

spec:
  purpose: |
    사용자가 만들고 싶은 새 skill 의 의도를 자연어로 받아
    contract-compliant SKILL.md + zipsa-dist (manifest + instruction)
    를 staging 에 생성하고, validate / run / analyze 의 iteration
    으로 함께 다듬는다.

  instructions: ./instruction.md

  model:
    name: claude-sonnet-4-6

  tools:
    builtin:
      - WebFetch    # 사용자가 언급한 외부 API doc 참고용

  # PR #102 의 게이트. 이 플래그가 있어야 mcp__zipsa__run_staging_skill
  # 호출 가능. skill-builder 만 가지는 권한 — 다른 skill 들은 staging
  # 의 draft 를 실행할 권한 없음.
  allows_staging_run: true

  limits:
    max_turns: 50           # 5 iteration × 10 turn 추정
    max_cost_usd: 2.0        # Sonnet + child run 비용 포함
    timeout_seconds: 1800    # 30 분
