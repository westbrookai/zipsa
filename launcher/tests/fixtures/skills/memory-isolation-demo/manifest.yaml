apiVersion: zipsa.dev/v1alpha1
kind: Skill
metadata:
  name: memory-isolation-demo
  version: 0.1.0
  description: E2E fixture — writes color=red to OWN memory, then calls memory-peek child.
spec:
  purpose: Prove parent's memory writes don't leak to child.
  instructions: ./SKILL.md
  default_query: "go"
  children:
    - memory-peek
  model:
    name: claude-haiku-4-5-20251001
  tools:
    builtin: []
  limits:
    max_turns: 5
    max_cost_usd: 0.10
    timeout_seconds: 120
