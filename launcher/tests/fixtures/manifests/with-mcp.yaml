apiVersion: zipsa.dev/v1alpha1
kind: Skill
metadata:
  name: with-mcp
  version: 1.0.0
spec:
  purpose: Skill with MCP servers
  instructions: ./SKILL.md
  tools:
    builtin:
      - WebFetch
      - Bash
  mcp:
    - name: filesystem
      type: stdio
      command: npx
      args: ["-y", "@modelcontextprotocol/server-filesystem"]
      mount:
        host: ~/Documents
        mode: ro
      allowed_tools:
        - read_file
    - name: notion
      type: http
      url: https://mcp.notion.com/mcp
      connection: notion
      allowed_tools:
        - create-page
